<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Univers Caresse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Birthstone&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5a8a3a;
      --accent:  #d4a445;
      --gris:    #8b8680;
      --gris-fonce: #3d3b39;
      --beige:   #f2e4cf;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      background: #ffffff;
      color: var(--gris-fonce);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .logo-nom {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
      letter-spacing: 0.04em;
    }
    .logo-tagline {
      font-family: 'Birthstone', cursive;
      font-size: 1rem;
      color: var(--accent);
      margin-top: 2px;
    }
    .separateur {
      width: 48px;
      height: 1px;
      background: var(--beige);
      margin: 32px auto;
    }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 600;
      color: var(--beige);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .titre {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      color: var(--gris-fonce);
      margin-top: 8px;
    }
    .titre em {
      font-style: italic;
      color: var(--primary);
    }
    .desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--gris);
      font-weight: 300;
      margin-top: 16px;
      max-width: 360px;
      line-height: 1.8;
    }
    .bouton {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      border: none;
      padding: 12px 28px;
      transition: background 0.2s;
      text-decoration: none;
      background: var(--primary);
      color: white;
      margin-top: 32px;
    }
    .bouton:hover { background: #4a6e2e; }
    .pied {
      margin-top: 48px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--beige);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo-nom">Univers Caresse</div>
  <div class="logo-tagline">savons artisanaux</div>

  <div class="separateur"></div>

  <div class="code">404</div>
  <h1 class="titre">Cette page <em>s'est évaporée</em></h1>
  <p class="desc">La page que vous cherchez n'existe pas ou a été déplacée. Revenez à l'accueil pour continuer votre exploration.</p>

<a href="https://www.universcaresse.ca" class="bouton">Retour à l’accueil</a>

  <p class="pied">universcaresse.ca</p>
</body>
</html>
