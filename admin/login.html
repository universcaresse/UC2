<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../Images/plume.png">
  <title>Connexion — Univers Caresse</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Birthstone&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      /* Remplacement par un dégradé SANS gris (Blanc vers Beige chaud) */
      background: linear-gradient(180deg, #FFFFFF 0%, #FFFDF5 100%);
      font-family: 'DM Sans', sans-serif; 
    }
    
    .wrap { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      width: 100%; 
      max-width: 480px; 
      padding: 40px 20px; 
      position: relative;
    }
    
    .admin-label { position: absolute; top: 40px; left: 20px; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #d4a445; opacity: 0.8; }
    
    .logo { 
      width: 280px; 
      margin-bottom: 32px; 
      /* Un léger filtre pour donner de la profondeur au logo */
      filter: drop-shadow(0 4px 8px rgba(212, 164, 69, 0.15));
    }
    
    .separateur { width: 100%; height: 1px; background: #d4a445; margin-bottom: 32px; opacity: 0.6; }
    
    .row { display: flex; width: 100%; gap: 0; }
    
    .champ { 
      flex: 1; 
      padding: 12px 16px; 
      border: 1px solid #e0d8c8; /* Bordure plus chaude, moins grise */
      border-right: none; 
      border-radius: 4px 0 0 4px; 
      font-family: 'DM Sans', sans-serif; 
      font-size: 1rem; 
      background: #fff; 
      outline: none; 
    }
    
    .champ:focus { border-color: #5a8a3a; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
    
    .btn { 
      padding: 12px 20px; 
      background: #5a8a3a; 
      color: #FFFDF5; 
      border: none; 
      border-radius: 0 4px 4px 0; 
      font-family: 'DM Sans', sans-serif; 
      font-size: 0.85rem; 
      letter-spacing: 0.08em; 
      cursor: pointer; 
      white-space: nowrap;
      transition: background 0.3s;
    }
    
    .btn:hover { background: #4a6e2e; }
    
    .erreur { margin-top: 12px; color: #c44536; font-size: 0.85rem; min-height: 20px; text-align: center; font-weight: 400; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(255,253,245,0.92); z-index: 99; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .overlay.visible { display: flex; }
    .overlay-texte { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: #8b8680; letter-spacing: 0.1em; }
    .spinner-grand { position: relative; width: 60px; height: 60px; }
    .spinner-grand span { position: absolute; bottom: 0; left: 50%; border-radius: 50%; border: 2px solid #5a8a3a; opacity: 0; animation: flotter-login var(--dur) ease-in infinite; animation-delay: var(--delay); }
    .spinner-grand span:nth-child(1) { width:14px; height:14px; --tx:-18px; --drift:6px;  --dur:2.8s; --delay:0s;   }
    .spinner-grand span:nth-child(2) { width:20px; height:20px; --tx:10px;  --drift:-8px; --dur:3.2s; --delay:0.5s; }
    .spinner-grand span:nth-child(3) { width:10px; height:10px; --tx:-4px;  --drift:5px;  --dur:2.5s; --delay:1.0s; }
    .spinner-grand span:nth-child(4) { width:16px; height:16px; --tx:24px;  --drift:-6px; --dur:3.5s; --delay:1.5s; }
    .spinner-grand span:nth-child(5) { width:12px; height:12px; --tx:-24px; --drift:7px;  --dur:2.9s; --delay:2.0s; }
    @keyframes flotter-login { 0% { transform:translateX(var(--tx)) translateY(0) scale(0.4); opacity:0; } 10% { opacity:1; } 80% { opacity:0.6; } 100% { transform:translateX(calc(var(--tx) + var(--drift))) translateY(-70px) scale(1.05); opacity:0; } }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="spinner-grand">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="overlay-texte">Connexion en cours…</div>
  </div>
  <div class="wrap">
    <p class="admin-label">Administration</p>
    <img src="../Images/Divers/Logofinal.png" alt="Univers Caresse" class="logo">
    <div class="separateur"></div>
    <div class="row">
      <input type="password" id="input-mdp" class="champ" placeholder="Mot de passe">
      <button class="btn" onclick="valider()">ENTRER →</button>
    </div>
    <p id="erreur-mdp" class="erreur"></p>
  </div>

  <script>
    if (sessionStorage.getItem('uc_admin') === 'true') {
      window.location.href = '/admin/';
    }
    async function valider() {
      const btn = document.querySelector('.btn');
      if (btn.disabled) return;
      btn.disabled = true;
      document.getElementById('overlay').classList.add('visible');
      const mdp = document.getElementById('input-mdp').value;
      const res = await fetch('https://script.google.com/macros/s/AKfycbyZYLb_LWaaJ0kQRTdvJHuOamYI4OrO0fdaJjDAFk-UTOXIRF6OK67QiA6DjKUcBSU9/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'validerMotDePasse', mdp }),
        redirect: 'follow'
      });
      const data = await res.json();
      if (data && data.success) {
        sessionStorage.setItem('uc_admin', 'true');
        window.location.href = '/admin/';
      } else {
        document.getElementById('erreur-mdp').textContent = 'Mot de passe incorrect.';
        document.getElementById('input-mdp').value = '';
        document.getElementById('input-mdp').focus();
        btn.disabled = false;
        document.getElementById('overlay').classList.remove('visible');
      }
    }
    document.getElementById('input-mdp').addEventListener('keydown', e => {
      if (e.key === 'Enter') valider();
    });
  </script>
</body>
</html>
