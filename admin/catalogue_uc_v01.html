/* ── VIEWER ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8e4de; font-family: 'DM Sans', sans-serif; }

.viewer {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 20px 60px;
}

.viewer-nav {
  display: flex; align-items: center; gap: 24px; margin-bottom: 28px;
  background: white; padding: 12px 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
.nav-btn {
  background: var(--gdn); color: white; border: none;
  padding: 8px 22px; font-family: 'DM Sans'; font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.2s;
}
.nav-btn:disabled { opacity: 0.2; cursor: default; }
.nav-info { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gdn); min-width: 100px; text-align: center; }

.spread {
  display: none; flex-direction: row;
  box-shadow: 0 12px 48px rgba(0,0,0,0.28);
}
.spread.actif { display: flex; }
.spread .page + .page { border-left: 1px solid rgba(0,0,0,0.07); }

.imprimer-btn {
  margin-top: 24px; background: transparent; border: 1px solid var(--gdn);
  color: var(--gdn); padding: 10px 28px; font-family: 'DM Sans'; font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
}

/* ── PAGE ── */
.page {
  width: 816px; height: 1056px;
  background: var(--blanc);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.page-int {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}
.page-g .page-int { margin: 32px 0 0 32px; }
.page-d .page-int { margin: 32px 32px 0 0; }

/* ── CAT-PIED ── */
.cat-pied {
  flex-shrink: 0; height: 34px;
  padding: 0 44px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--beige);
  font-size: 8px; color: var(--gris); letter-spacing: 0.1em; text-transform: uppercase;
}

/* ── COLLECTION ENTETE ── */
.col-entete {
  display: grid; grid-template-columns: 1fr 1.1fr;
  flex-shrink: 0;
  overflow: hidden;
}
.col-entete-photo { overflow: hidden; position: relative; }
.col-entete-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
.col-entete-photo::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 55%, var(--blanc));
}
.col-entete-droite {
  display: flex; flex-direction: column; overflow: hidden;
}
.col-entete-hex {
  background: var(--hx); flex-shrink: 0;
  padding: 20px 28px 16px;
}
.col-entete-trait {
  width: 24px; height: 2px; background: rgba(255,255,255,0.5); margin-bottom: 10px;
}
.col-entete-nom {
  font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 400;
  color: var(--tc); line-height: 1; letter-spacing: 0.04em;
}
.col-entete-slogan {
  font-size: 8.5px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--tc); opacity: 0.75; margin-top: 6px; line-height: 1.4;
}
.col-entete-desc {
  flex: 1; overflow: hidden; padding: 16px 28px 12px;
  background: var(--blanc);
}
.col-entete-desc p {
  font-size: 9.5px; line-height: 1.85; color: var(--gris); font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
}

/* ── GAMME SEPARATEUR ── */
.gam-sep {
  flex-shrink: 0; padding: 10px 0 8px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--beige);
  margin-bottom: 8px;
}
.gam-sep-trait { width: 20px; height: 2px; background: var(--hx); flex-shrink: 0; }
.gam-sep-nom {
  font-family: 'Playfair Display', serif; font-size: 12px; font-weight: 400;
  color: var(--gdn); letter-spacing: 0.06em; text-transform: uppercase;
}
.gam-sep-desc {
  font-size: 8px; font-weight: 300; color: var(--gris);
  letter-spacing: 0.06em; flex: 1; text-align: right;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-style: italic; padding-right: 4px;
}

/* ── PRODUITS GRILLE ── */
.produits-zone { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden; min-height: 0; }
.produits-rangee { display: grid; gap: 8px; flex: 1; min-height: 0; }
.rangee-2 { grid-template-columns: 1fr 1fr; }
.rangee-1 { grid-template-columns: 1fr; }
.rangee-3 { grid-template-columns: 1fr 1fr 1fr; }

/* ── CARTE ── */
.carte { overflow: hidden; position: relative; display: flex; }

/* Grammar A: photo haut, hex bas */
.carte-A { flex-direction: column; }
.carte-A .carte-photo { flex: 1; overflow: hidden; }
.carte-A .carte-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.carte-A .carte-info {
  background: var(--hx); flex-shrink: 0; height: 38%;
  padding: 10px 12px 8px; display: flex; flex-direction: column; justify-content: flex-end;
}

/* Grammar B: hex haut, photo bas */
.carte-B { flex-direction: column; }
.carte-B .carte-info {
  background: var(--hx); flex-shrink: 0; height: 36%;
  padding: 12px 12px 8px; display: flex; flex-direction: column; justify-content: flex-start;
}
.carte-B .carte-photo { flex: 1; overflow: hidden; }
.carte-B .carte-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Grammar C: hex bande gauche, photo droite */
.carte-C { flex-direction: row; }
.carte-C .carte-info {
  background: var(--hx); width: 36%; flex-shrink: 0;
  padding: 12px 10px; display: flex; flex-direction: column; justify-content: flex-end;
}
.carte-C .carte-photo { flex: 1; overflow: hidden; }
.carte-C .carte-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Grammar D: hex bande droite, photo gauche */
.carte-D { flex-direction: row; }
.carte-D .carte-photo { flex: 1; overflow: hidden; }
.carte-D .carte-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.carte-D .carte-info {
  background: var(--hx); width: 36%; flex-shrink: 0;
  padding: 12px 10px; display: flex; flex-direction: column; justify-content: flex-start;
}

/* Grammar E: photo pleine avec overlay hex bas */
.carte-E { position: relative; }
.carte-E .carte-photo { position: absolute; inset: 0; }
.carte-E .carte-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.carte-E .carte-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--hx-over); padding: 14px 14px 10px;
}

/* ── TEXTES CARTE ── */
.carte-nom {
  font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 500;
  color: var(--tc); line-height: 1.25; margin-bottom: 4px; letter-spacing: 0.02em;
}
.carte-desc {
  font-size: 8.5px; font-weight: 300; color: var(--tc); opacity: 0.82;
  font-style: italic; line-height: 1.55; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.carte-prix {
  font-size: 8.5px; font-weight: 400; color: var(--tc); opacity: 0.7;
  letter-spacing: 0.06em; margin-top: 5px; flex-shrink: 0;
}

/* ── ZONE TAMPON ── */
.zone-tampon {
  flex: 1; display: flex; flex-direction: row;
  overflow: hidden;
}
.tampon-photo {
  flex: 1; overflow: hidden; position: relative;
}
.tampon-photo img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.tampon-texte {
  width: 38%; background: var(--hx);
  padding: 24px 20px; display: flex; flex-direction: column; justify-content: center;
}
.tampon-titre {
  font-family: 'Playfair Display'; font-size: 13px; font-style: italic;
  color: var(--tc); line-height: 1.5; margin-bottom: 10px;
}
.tampon-trait {
  width: 20px; height: 1px; background: rgba(255,255,255,0.4); margin-bottom: 10px;
}
.tampon-corps {
  font-size: 9px; color: var(--tc); opacity: 0.78; line-height: 1.7; font-weight: 300;
}

/* ── PAGE SPÉCIALE: COLLECTION SOLO ── */
.col-solo {
  flex: 1; display: grid; grid-template-rows: 1fr 1fr; gap: 0;
  overflow: hidden;
}
.col-solo-haut {
  display: grid; grid-template-columns: 1fr 1fr; overflow: hidden;
}
.col-solo-bas {
  display: grid; grid-template-columns: 1fr 1fr; overflow: hidden;
  border-top: 1px solid var(--beige);
}

/* ── PRINT ── */
@media print {
  body { background: white; }
  .viewer-nav, .imprimer-btn, .spread:not(.actif) { display: none !important; }
  .viewer { padding: 0; background: white; }
  .spread { display: flex !important; page-break-after: always; box-shadow: none; }
  .page { width: 8.5in; height: 11in; page-break-after: always; }
  @page { size: 8.5in 11in; margin: 0; }
}
</style>
</head>
<body>
<div class="viewer">
  <div class="viewer-nav">
    <button class="nav-btn" id="btn-prev" onclick="prevSpread()" disabled>← Précédent</button>
    <span class="nav-info" id="nav-info">Pages 1-2</span>
    <button class="nav-btn" id="btn-next" onclick="nextSpread()">Suivant →</button>
  </div>
  <div id="pages-wrap"></div>
  <button class="imprimer-btn" onclick="window.print()">Imprimer le catalogue</button>

// ── HELPERS ──
function fmt(p) {
  if (!p.formats || p.formats.length === 0) return '';
  const f = p.formats[0];
  return `${f.poids}${f.unite} · ${parseFloat(f.prix).toFixed(2)} $`;
}

function img(url, alt) {
  if (!url) return `<div style="background:var(--hx);width:100%;height:100%;"></div>`;
  return `<img src="${url}" alt="${alt || ''}" loading="lazy">`;
}

function truncate(str, max) {
  if (!str) return '';
  return str.length > max ? str.slice(0, max-1) + '…' : str;
}

// ── GRAMMAIRES ──
const GRAMMARS = ['A','B','C','D','B','A','D','C','A','B','E','C'];
let gramIdx = 0;

function nextGram() {
  return GRAMMARS[gramIdx++ % GRAMMARS.length];
}

function carte(p, gram, extraClass) {
  const gr = gram || nextGram();
  return `<div class="carte carte-${gr} p-${p.id} ${extraClass||''}" >
    <div class="carte-photo">${img(p.image_url, p.nom)}</div>
    <div class="carte-info">
      <div class="carte-nom">${p.nom}</div>
      <div class="carte-desc">${truncate(p.desc_emballage, 110) || ''}</div>
      <div class="carte-prix">${fmt(p)}</div>
    </div>
  </div>`;
}

// ── ENTETE COLLECTION ──
function colEntete(col, hauteur) {
  const desc = (col.description || '').split('\n')[0];
  return `<div class="col-entete c-${col.id}" style="height:${hauteur}px">
    <div class="col-entete-photo">${img(col.photo, col.nom)}</div>
    <div class="col-entete-droite">
      <div class="col-entete-hex">
        <div class="col-entete-trait"></div>
        <div class="col-entete-nom">${col.nom}</div>
        <div class="col-entete-slogan">${col.slogan || ''}</div>
      </div>
      <div class="col-entete-desc"><p>${truncate(desc, 320)}</p></div>
    </div>
  </div>`;
}

// ── SÉPARATEUR GAMME ──
function gamSep(gam, colHex) {
  const desc = gam.description ? truncate(gam.description.split('\n')[0], 80) : '';
  return `<div class="gam-sep c-${gam.col_id}">
    <div class="gam-sep-trait"></div>
    <div class="gam-sep-nom">${gam.nom}</div>
    ${desc ? `<div class="gam-sep-desc">${desc}</div>` : ''}
  </div>`;
}

// ── LAYOUT PRODUITS EN RANGÉES ──
function produitsZone(produits, nbRangees, nPerRow) {
  const rows = [];
  for (let i = 0; i < produits.length; i += nPerRow) {
    const rowProds = produits.slice(i, i + nPerRow);
    const rowClass = rowProds.length === 1 ? 'rangee-1' : rowProds.length === 2 ? 'rangee-2' : 'rangee-3';
    rows.push(`<div class="produits-rangee ${rowClass}">${rowProds.map(p => carte(p)).join('')}</div>`);
  }
  return `<div class="produits-zone">${rows.join('')}</div>`;
}

// ── GÉNÉRATEUR DE PAGES ──
const pages = [];

function addPage(side, content, pageNum) {
  pages.push({ side, content, pageNum });
}

function buildCollectionPages(col) {
  const allProds = col.gammes.flatMap(g => g.produits.map(p => ({...p, _gam: g})));
  const total = allProds.length;
  
  // Première page: entête + premiers produits
  const firstPageProds = total > 8 ? 4 : total <= 3 ? total : 2;
  const headerH = total <= 4 ? 180 : 220;
  
  let firstContent = colEntete(col, headerH);
  
  // Ajouter les séparateurs de gamme si plusieurs gammes
  let prodsForFirst = allProds.slice(0, firstPageProds);
  const firstGams = [...new Set(prodsForFirst.map(p => p._gam.id))];
  
  let firstBody = '';
  if (col.gammes.length > 1) {
    for (const gamId of firstGams) {
      const gam = col.gammes.find(g => g.id === gamId);
      const gamProds = prodsForFirst.filter(p => p._gam.id === gamId);
      firstBody += gamSep(gam);
      firstBody += produitsZone(gamProds, 1, 2);
    }
  } else {
    firstBody = produitsZone(prodsForFirst, firstPageProds <= 2 ? 1 : 2, 2);
  }
  
  firstContent += firstBody;
  pages.push({ content: firstContent, col: col.id });
  
  // Pages suivantes
  let remaining = allProds.slice(firstPageProds);
  let gammeIdx = 0;
  
  while (remaining.length > 0) {
    let pageContent = '';
    let pageProds = remaining.slice(0, 4);
    remaining = remaining.slice(4);
    
    // Grouper par gamme pour les séparateurs
    if (col.gammes.length > 1) {
      const pageGams = [...new Set(pageProds.map(p => p._gam.id))];
      for (const gamId of pageGams) {
        const gam = col.gammes.find(g => g.id === gamId);
        const gamProds = pageProds.filter(p => p._gam.id === gamId);
        pageContent += gamSep(gam);
        pageContent += produitsZone(gamProds, Math.ceil(gamProds.length/2), 2);
      }
    } else {
      pageContent = produitsZone(pageProds, Math.ceil(pageProds.length/2), 2);
    }
    
    pages.push({ content: pageContent, col: col.id });
  }
}

// Générer toutes les collections (pages 4+)
// Pages 1-3 sont figées — on commence à 4
let pageNum = 4;
for (const colId in DATA) {
  gramIdx = 0; // reset grammar per collection
  buildCollectionPages(DATA[colId]);
}

// ── RENDU ──
const wrap = document.getElementById('pages-wrap');

// Grouper en spreads (paires de pages)
const spreads = [];
// Pages 1-3 sont déjà dans le booklet imprimé, on commence nos pages à 4
// Mais pour la prévisualisation, on affiche directement depuis la page 4

for (let i = 0; i < pages.length; i += 2) {
  spreads.push([pages[i], pages[i+1] || null]);
}

let currentSpread = 0;

function renderSpread(idx) {
  const [left, right] = spreads[idx];
  const spreadEl = document.createElement('div');
  spreadEl.className = 'spread actif';
  
  function makePageEl(pg, num, side) {
    if (!pg) {
      const blank = document.createElement('div');
      blank.className = `page page-${side}`;
      blank.innerHTML = `<div class="page-int"></div><div class="cat-pied"><span>Univers Caresse</span><span>${num}</span></div>`;
      return blank;
    }
    const el = document.createElement('div');
    el.className = `page page-${side} c-${pg.col}`;
    el.innerHTML = `
      <div class="page-int">${pg.content}</div>
      <div class="cat-pied">
        <span style="font-family:'Playfair Display';font-style:italic">Univers Caresse</span>
        <span>${num}</span>
      </div>`;
    return el;
  }
  
  const leftNum = pageNum + idx * 2;
  const rightNum = leftNum + 1;
  
  spreadEl.appendChild(makePageEl(left, leftNum, 'g'));
  spreadEl.appendChild(makePageEl(right, rightNum, 'd'));
  
  return spreadEl;
}

// Rendre tous les spreads (masqués sauf le premier)
const spreadEls = spreads.map((_, i) => {
  const el = renderSpread(i);
  if (i !== 0) el.classList.remove('actif');
  wrap.appendChild(el);
  return el;
});

function updateNav() {
  document.getElementById('btn-prev').disabled = currentSpread === 0;
  document.getElementById('btn-next').disabled = currentSpread === spreadEls.length - 1;
  const l = pageNum + currentSpread * 2;
  document.getElementById('nav-info').textContent = `Pages ${l}–${l+1}`;
}

function prevSpread() {
  if (currentSpread > 0) {
    spreadEls[currentSpread].classList.remove('actif');
    currentSpread--;
    spreadEls[currentSpread].classList.add('actif');
    updateNav();
  }
}

function nextSpread() {
  if (currentSpread < spreadEls.length - 1) {
    spreadEls[currentSpread].classList.remove('actif');
    currentSpread++;
    spreadEls[currentSpread].classList.add('actif');
    updateNav();
  }
}

updateNav();
</script>
