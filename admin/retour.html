<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dfasrauyy/image/upload/v1779040734/11Divers/plume.svg">
  <title>Retour de paiement — Univers Caresse</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Birthstone&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #FFFFFF 0%, #FFFDF5 100%);
      font-family: 'DM Sans', sans-serif;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      padding: 40px 20px;
      position: relative;
    }

    .logo {
      width: 280px;
      margin-bottom: 32px;
      filter: drop-shadow(0 4px 8px rgba(212, 164, 69, 0.15));
    }

    .separateur { width: 100%; height: 1px; background: #d4a445; margin-bottom: 32px; opacity: 0.6; }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: #3d3b39;
      text-align: center;
      margin-bottom: 24px;
    }

    .info-commande {
      width: 100%;
      background: #fff;
      border: 1px solid #e0d8c8;
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }

    .info-ligne {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid #f2e4cf;
    }
    .info-ligne:last-child { border-bottom: none; }

    .info-ligne.principale {
      padding-bottom: 12px;
      margin-bottom: 6px;
      border-bottom: 1px solid #d4a445;
    }
    .info-ligne.principale .info-valeur {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #5a8a3a;
      font-weight: 600;
    }

    .info-libelle {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b8680;
    }
    .info-valeur {
      font-size: 0.82rem;
      color: #3d3b39;
      word-break: break-all;
      text-align: right;
      margin-left: 16px;
    }

    .aucune-info {
      color: #8b8680;
      font-size: 0.85rem;
      text-align: center;
    }

    .btn {
      padding: 14px 32px;
      background: #5a8a3a;
      color: #FFFDF5;
      border: none;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.3s;
    }

    .btn:hover { background: #4a6e2e; }

    .note {
      margin-top: 16px;
      color: #8b8680;
      font-size: 0.78rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="https://res.cloudinary.com/dfasrauyy/image/upload/v1779274322/Logofinal_kphpp9.png" alt="Univers Caresse" class="logo">
    <div class="separateur"></div>
    <p class="message">Paiement complété</p>

    <div class="info-commande" id="info-commande"></div>

    <button class="btn" onclick="fermer()">PAIEMENT RÉUSSI →</button>
    <p class="note" id="note-fermeture"></p>
  </div>

  <script>
    function afficherInfos() {
      const params = new URLSearchParams(window.location.search);
      const referenceId = params.get('referenceId');
      const orderId = params.get('orderId');
      const transactionId = params.get('transactionId');
      const checkoutId = params.get('checkoutId');
      const conteneur = document.getElementById('info-commande');

      if (!referenceId && !orderId && !transactionId && !checkoutId) {
        conteneur.innerHTML = '<p class="aucune-info">Aucune information de paiement reçue dans l\'URL.</p>';
        return;
      }

      let html = '';
      if (referenceId) {
        html += '<div class="info-ligne principale"><span class="info-libelle">Commande</span><span class="info-valeur">' + referenceId + '</span></div>';
      }
      if (orderId) {
        html += '<div class="info-ligne"><span class="info-libelle">Order ID</span><span class="info-valeur">' + orderId + '</span></div>';
      }
      if (transactionId) {
        html += '<div class="info-ligne"><span class="info-libelle">Transaction ID</span><span class="info-valeur">' + transactionId + '</span></div>';
      }
      if (checkoutId) {
        html += '<div class="info-ligne"><span class="info-libelle">Checkout ID</span><span class="info-valeur">' + checkoutId + '</span></div>';
      }
      conteneur.innerHTML = html;
    }

    function fermer() {
      window.close();
      setTimeout(function () {
        document.getElementById('note-fermeture').textContent = 'Vous pouvez fermer cet onglet manuellement.';
      }, 300);
    }

    afficherInfos();
  </script>
</body>
</html>
